<!DOCTYPE html>
<html>
<head>
    <title>Order Confirmed - Foodie</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .success-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #28a745;
            margin-bottom: 15px;
        }

        p {
            color: gray;
        }

        .home-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff4d4d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .home-btn:hover {
            background: #e63e3e;
        }
    </style>
</head>

<body>

<div class="success-card">
    <h1>🎉 Order Confirmed!</h1>
    <p>Your food is on the way. Thank you for ordering.</p>
    <a href="index.html" class="home-btn">Back to Home</a>
</div>

</body>
</html>
